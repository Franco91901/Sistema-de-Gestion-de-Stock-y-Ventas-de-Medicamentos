server:
  port: 8094

spring:
  application:
    name: GATEWAY
  cloud:
    gateway:
      routes:
        - id: STOCK-SERVICE
          uri: lb://FARMACIA
          predicates:
            - Path=/api/**

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
